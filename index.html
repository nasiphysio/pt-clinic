<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physiclinic — PT Patient Archive</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --p:#1a5c4a;--pl:#22776a;--pd:#0d3d2e;
  --acc:#e8a020;--accl:#f5c45a;
  --bg:#eef2f0;--card:#fff;
  --txt:#162820;--muted:#5a7a6e;--border:#ccddd6;
  --red:#d94f4f;--redl:#fdeaea;
  --green:#27ae60;--greenl:#eafaf1;
  --sh:0 2px 14px rgba(13,61,46,.09);
  --shl:0 8px 36px rgba(13,61,46,.15);
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:15px}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--pd);background-image:radial-gradient(circle at 20% 80%,rgba(34,119,106,.3) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(232,160,32,.15) 0%,transparent 50%)}
.login-box{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:400px;box-shadow:var(--shl)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-family:'DM Serif Display',serif;font-size:28px;color:var(--pd);font-weight:400}
.login-logo p{font-size:13px;color:var(--muted);margin-top:4px}
.login-error{background:var(--redl);color:var(--red);padding:10px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:14px;display:none}

/* APP */
#appScreen{display:none}
.wrap{display:flex;min-height:100vh}
.side{width:230px;background:var(--pd);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.side-logo{padding:20px 18px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.side-logo h1{color:#fff;font-family:'DM Serif Display',serif;font-size:17px;line-height:1.4;font-weight:400}
.side-logo span{color:var(--accl);font-size:11px;font-weight:500;letter-spacing:.5px}
.side-user{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.side-user strong{color:#fff;display:block;font-size:13px;font-weight:700}
.side-user span{color:rgba(255,255,255,.55);font-size:11px}
.side-nav{padding:12px 10px;display:flex;flex-direction:column;gap:3px;flex:1}
.ni{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:var(--rs);color:rgba(255,255,255,.65);cursor:pointer;font-size:14px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:all .2s}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}
.ni.on{background:var(--acc);color:var(--pd);font-weight:700}
.ni.locked{opacity:.4;cursor:not-allowed}
.ni.locked:hover{background:none;color:rgba(255,255,255,.65)}
.side-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1)}
.logout-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15);border-radius:var(--rs);padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:all .2s}
.logout-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}
.main{margin-left:230px;flex:1;padding:28px}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.pt{font-family:'DM Serif Display',serif;font-size:24px;color:var(--pd)}
.ps{font-size:13px;color:var(--muted);margin-top:2px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:22px}

/* PATIENT GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.pcard{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;border:2px solid transparent;transition:all .2s;position:relative;overflow:hidden}
.pcard::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--p)}
.pcard:hover{box-shadow:var(--shl);border-color:var(--p);transform:translateY(-2px)}
.pcard-name{font-family:'DM Serif Display',serif;font-size:17px;color:var(--pd);margin-bottom:4px}
.pcard-meta{font-size:13px;color:var(--muted);display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:8px}
.bdone{background:var(--greenl);color:var(--green)}
.bpend{background:#fff8e6;color:#b07a00}
.pcard-actions{display:flex;gap:7px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}

/* SEARCH */
.sbar{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:var(--rs);padding:10px 14px;box-shadow:var(--sh);border:1.5px solid var(--border);margin-bottom:16px}
.sbar input{border:none;outline:none;flex:1;font-family:'DM Sans',sans-serif;font-size:14px;background:transparent}
.sbar input::placeholder{color:var(--muted)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.bp{background:var(--p);color:#fff}.bp:hover{background:var(--pl)}
.ba{background:var(--acc);color:var(--pd)}.ba:hover{background:var(--accl)}
.bd{background:var(--redl);color:var(--red)}.bd:hover{background:var(--red);color:#fff}
.bg{background:transparent;color:var(--muted);border:1.5px solid var(--border)}.bg:hover{border-color:var(--p);color:var(--p)}
.bpdf{background:#c0392b;color:#fff}.bpdf:hover{background:#a93226}
.bcsv{background:#1d6f42;color:#fff}.bcsv:hover{background:#155235}
.bs{padding:6px 12px;font-size:13px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(13,61,46,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s}
.mo.open{opacity:1;pointer-events:all}
.mdl{background:#fff;border-radius:var(--r);width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:var(--shl);transform:translateY(24px);transition:transform .25s}
.mo.open .mdl{transform:translateY(0)}
.mhd{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mtt{font-family:'DM Serif Display',serif;font-size:18px;color:var(--pd)}
.mcl{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
.mbody{padding:20px 22px;display:flex;flex-direction:column;gap:16px}
.mft{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.fc{border:1.5px solid var(--border);border-radius:var(--rs);padding:9px 13px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt);outline:none;transition:border-color .2s;background:var(--bg);width:100%}
.fc:focus{border-color:var(--p);background:#fff}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sdiv{background:linear-gradient(90deg,var(--pd),var(--p));color:#fff;padding:9px 16px;border-radius:var(--rs);font-size:11px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;margin:4px 0 6px}

/* REGION TABS */
.rtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.rtab{padding:8px 16px;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:var(--bg);color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .2s}
.rtab.on{background:var(--p);color:#fff;border-color:var(--p)}
.rtab-add{padding:8px 14px;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer;border:2px dashed var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .2s}
.rtab-add:hover{border-color:var(--p);color:var(--p)}
.region-panel{display:none}.region-panel.on{display:block}

/* PILLS */
.pill-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.pill{display:inline-flex;align-items:center;padding:7px 15px;border-radius:22px;border:2px solid var(--border);background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;-webkit-appearance:none;appearance:none}
.pill:hover{border-color:var(--p);background:#e0ede8;color:var(--p)}
.pill.sel{background:var(--p)!important;color:#fff!important;border-color:var(--p)!important;font-weight:700;box-shadow:0 2px 10px rgba(26,92,74,.3)}
.pill.sel::before{content:"✓  "}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row input{flex:1;border:1.5px dashed var(--border);border-radius:22px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;background:transparent}
.add-row input:focus{border-color:var(--p)}
.add-row button{background:var(--p);color:#fff;border:none;border-radius:22px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}

/* VAS */
.vas-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);font-weight:700;font-size:13px;cursor:pointer;background:var(--bg);font-family:'DM Sans',sans-serif;transition:all .18s;color:var(--txt)}
.vas-btn.sel{background:var(--p);color:#fff;border-color:var(--p);transform:scale(1.15)}

/* PROFILE */
.profhd{background:linear-gradient(135deg,var(--pd),var(--pl));border-radius:var(--r);padding:24px;color:#fff;margin-bottom:18px;display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap}
.profname{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px}
.proftags{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.ptag{background:rgba(255,255,255,.15);border-radius:20px;padding:3px 12px;font-size:12px;font-weight:500}
.ptag.gold{background:var(--acc);color:var(--pd);font-weight:700}
.asec{margin-bottom:14px}
.asec-ttl{font-size:11px;font-weight:700;color:var(--p);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--border)}
.atags{display:flex;flex-wrap:wrap;gap:7px}
.atag{background:var(--bg);border:1.5px solid var(--border);padding:4px 13px;border-radius:20px;font-size:13px;font-weight:500}
.atag.key{background:var(--greenl);border-color:var(--green);color:#1a6b40}
.atag.red{background:var(--redl);border-color:var(--red);color:var(--red)}
.region-card{background:var(--bg);border-radius:var(--r);padding:18px;margin-bottom:14px;border-left:4px solid var(--p)}
.region-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--pd);margin-bottom:12px}

/* VISIT CARD in profile */
.visit-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:20px;margin-bottom:16px;border-top:3px solid var(--p);position:relative}
.visit-card.followup{border-top-color:var(--acc)}
.visit-label{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:14px}
.visit-label.initial{background:var(--greenl);color:var(--green)}
.visit-label.followup{background:#fff3cd;color:#b07a00}
.visit-del{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px}
.visit-del:hover{color:var(--red)}

/* CONFIRM */
.conf-o{position:fixed;inset:0;background:rgba(13,61,46,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s}
.conf-o.open{opacity:1;pointer-events:all}
.conf-b{background:#fff;border-radius:var(--r);padding:28px;max-width:330px;width:100%;text-align:center;box-shadow:var(--shl);transform:scale(.9);transition:transform .2s}
.conf-o.open .conf-b{transform:scale(1)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:14px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MANAGE */
.opt-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto}
.opt-row{display:flex;align-items:center;gap:8px;background:var(--bg);padding:8px 12px;border-radius:var(--rs)}
.opt-row span{flex:1;font-size:14px}
.opt-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px}
.opt-del:hover{background:var(--redl);color:var(--red)}
.mtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.mtab{padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:none;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .2s}
.mtab.on{background:var(--p);color:#fff;border-color:var(--p)}
.note-box{background:#f0f7f4;border-left:3px solid var(--p);padding:10px 14px;border-radius:0 var(--rs) var(--rs) 0;font-size:13px;color:var(--muted)}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--pd);color:#fff;padding:12px 20px;border-radius:var(--rs);font-size:14px;font-weight:600;z-index:999;transform:translateY(80px);transition:transform .3s;box-shadow:var(--shl)}
.toast.show{transform:translateY(0)}
.toast.err{background:var(--red)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ico{font-size:44px;display:block;margin-bottom:12px}

/* MOBILE */
.mtoggle{display:none;position:fixed;top:13px;left:13px;z-index:300;background:var(--pd);color:#fff;border:none;border-radius:var(--rs);padding:9px 11px;font-size:18px;cursor:pointer}
.ovcl{display:none}
@media(max-width:768px){
  .side{transform:translateX(-100%)}.side.open{transform:translateX(0)}
  .main{margin-left:0;padding:14px;padding-top:58px}
  .mtoggle{display:block}
  .ovcl{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
  .fr{grid-template-columns:1fr}.pgrid{grid-template-columns:1fr}
  .login-box{padding:32px 24px}
}

/* PDF PRINT STYLES */
@media print{
  body{background:#fff}
  .no-print{display:none!important}
  .pdf-page{page-break-after:always}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Physiclinic</h1>
      <p>PT Patient Archive — Ortho</p>
    </div>
    <div class="login-error" id="loginErr"></div>
    <div class="fg" style="margin-bottom:14px">
      <label class="fl">Email</label>
      <input class="fc" type="email" id="lEmail" placeholder="your@email.com">
    </div>
    <div class="fg" style="margin-bottom:22px">
      <label class="fl">Password</label>
      <input class="fc" type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn bp" style="width:100%;justify-content:center;padding:12px" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <button class="mtoggle" onclick="toggleSide()">☰</button>
  <div class="ovcl" id="ovcl" onclick="toggleSide()"></div>
  <div class="wrap">
    <aside class="side" id="side">
      <div class="side-logo"><h1>Physiclinic</h1><span>PT Patient Archive</span></div>
      <div class="side-user">
        <strong id="sideUserName">...</strong>
        <span id="sideUserRole">...</span>
      </div>
      <nav class="side-nav">
        <button class="ni on" onclick="goPage('patients')"><span>👥</span> Patients</button>
        <button class="ni" id="navManage" onclick="goPage('manage')"><span>⚙️</span> Manage Options</button>
        <button class="ni" id="navUsers" onclick="goPage('users')"><span>👤</span> Manage Users</button>
      </nav>
      <div class="side-footer">
        <button class="logout-btn" onclick="doLogout()">
          <span>⇠</span> Sign Out
        </button>
      </div>
    </aside>
    <main class="main">
      <!-- PATIENTS PAGE -->
      <div id="pg-patients">
        <div class="ph">
          <div><div class="pt">Patient Archive</div><div class="ps" id="pcnt"></div></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn bcsv" id="btnExportAll" onclick="exportAll()">📊 Export All</button>
            <button class="btn bp" onclick="openAdd()">+ New Patient</button>
          </div>
        </div>
        <div class="sbar">
          <span style="color:var(--muted)">🔍</span>
          <input type="text" id="search" placeholder="Search by name, diagnosis, or region..." oninput="renderList()">
        </div>
        <div class="pgrid" id="pgrid"></div>
      </div>
      <!-- MANAGE PAGE -->
      <div id="pg-manage" style="display:none">
        <div class="ph"><div><div class="pt">Manage Options</div><div class="ps">Add or remove options from assessment lists</div></div></div>
        <div class="card"><div class="mtabs" id="mgTabs"></div><div id="mgBody"></div></div>
      </div>
      <!-- USERS PAGE -->
      <div id="pg-users" style="display:none">
        <div class="ph"><div><div class="pt">Manage Users</div><div class="ps">Add or remove clinic staff accounts</div></div></div>
        <div class="card" id="usersBody"></div>
      </div>
      <!-- PROFILE PAGE -->
      <div id="pg-profile" style="display:none"></div>
    </main>
  </div>
</div>

<!-- MODAL: NEW PATIENT -->
<div class="mo" id="moAdd">
  <div class="mdl" style="max-width:460px">
    <div class="mhd"><div class="mtt">New Patient</div><button class="mcl" onclick="closeM('moAdd')">✕</button></div>
    <div class="mbody">
      <div class="note-box">📝 Basic info — entered by receptionist</div>
      <div class="fr">
        <div class="fg"><label class="fl">Full Name *</label><input class="fc" id="iName" placeholder="Patient name"></div>
        <div class="fg"><label class="fl">Age *</label><input class="fc" id="iAge" type="number" placeholder="Age"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Gender</label><select class="fc" id="iGender"><option>Male</option><option>Female</option></select></div>
        <div class="fg"><label class="fl">Occupation</label><input class="fc" id="iJob" placeholder="e.g. Office worker"></div>
      </div>
      <div class="fg"><label class="fl">Phone</label><input class="fc" id="iPhone" placeholder="Phone number"></div>
    </div>
    <div class="mft">
      <button class="btn bg" onclick="closeM('moAdd')">Cancel</button>
      <button class="btn bp" onclick="saveNew()">Save Patient</button>
    </div>
  </div>
</div>

<!-- MODAL: ASSESSMENT (used for both initial & follow-up) -->
<div class="mo" id="moAssess">
  <div class="mdl">
    <div class="mhd"><div class="mtt" id="assessTitle">Assessment</div><button class="mcl" onclick="closeM('moAssess')">✕</button></div>
    <div class="mbody" id="assessBody"></div>
    <div class="mft">
      <button class="btn bg" onclick="closeM('moAssess')">Cancel</button>
      <button class="btn bp" onclick="saveAssess()">💾 Save</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD USER -->
<div class="mo" id="moUser">
  <div class="mdl" style="max-width:440px">
    <div class="mhd"><div class="mtt">Add Staff Account</div><button class="mcl" onclick="closeM('moUser')">✕</button></div>
    <div class="mbody">
      <div class="fg"><label class="fl">Full Name</label><input class="fc" id="uName" placeholder="Staff name"></div>
      <div class="fg"><label class="fl">Email *</label><input class="fc" id="uEmail" type="email" placeholder="email@example.com"></div>
      <div class="fg"><label class="fl">Password *</label><input class="fc" id="uPass" type="password" placeholder="Min 6 characters"></div>
      <div class="fg"><label class="fl">Role</label>
        <select class="fc" id="uRole">
          <option value="doctor">Doctor (Full Access)</option>
          <option value="receptionist">Receptionist (Add patients only)</option>
        </select>
      </div>
    </div>
    <div class="mft">
      <button class="btn bg" onclick="closeM('moUser')">Cancel</button>
      <button class="btn bp" onclick="saveUser()">Create Account</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="conf-o" id="confO">
  <div class="conf-b">
    <div style="font-size:36px;margin-bottom:10px">⚠️</div>
    <div style="font-family:'DM Serif Display',serif;font-size:17px;color:var(--pd);margin-bottom:7px" id="confTitle">Confirm</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:18px" id="confMsg"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn bg bs" onclick="closeConf()">Cancel</button>
      <button class="btn bd bs" id="confBtn">Delete</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBV6--Y8VTOIm0XhU1h-6GSJmJiWwbBMd8",
  authDomain: "physiclinic-4a8d1.firebaseapp.com",
  projectId: "physiclinic-4a8d1",
  storageBucket: "physiclinic-4a8d1.firebasestorage.app",
  messagingSenderId: "581907813652",
  appId: "1:581907813652:web:c203369bb92e63d01b1e01"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── STATE ──
let CUR_USER  = null;
let PATIENTS  = [];
let OPT_CACHE = null;
let MG_TAB    = null;

// Assessment editing state
let AS_PID     = null;   // patient id
let AS_TYPE    = null;   // 'initial' | 'followup'
let AS_FU_ID   = null;   // followup id if editing
let AS_DATE    = '';
let AS_REGIONS = [];     // [{region, diagnoses, complaints, findings, problems, treatment, vas, sessionsPlanned, freq}]
let AS_CUR_REG = 0;
let AS_DURATION = '';
let AS_ONSET   = '';
let AS_NOTES   = '';

// ── AUTH ──
window.doLogin = async () => {
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch(e) { errEl.textContent = 'Invalid email or password'; errEl.style.display = 'block'; }
};

window.doLogout = async () => {
  await signOut(auth);
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('lEmail').value = '';
  document.getElementById('lPass').value = '';
};

onAuthStateChanged(auth, async user => {
  if (user) {
    const snap = await getDoc(doc(db, 'users', user.uid));
    CUR_USER = snap.exists()
      ? { uid: user.uid, email: user.email, ...snap.data() }
      : { uid: user.uid, email: user.email, name: user.email, role: 'doctor' };
    if (!snap.exists()) await setDoc(doc(db, 'users', user.uid), { name: user.email, role: 'doctor', email: user.email });
    showApp();
  } else {
    CUR_USER = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('sideUserName').textContent = CUR_USER.name || CUR_USER.email;
  document.getElementById('sideUserRole').textContent = CUR_USER.role === 'doctor' ? '👨‍⚕️ Doctor' : '🗂️ Receptionist';
  if (CUR_USER.role !== 'doctor') {
    ['navManage','navUsers'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.add('locked');
      el.onclick = () => toast('Doctor access only', true);
    });
    document.getElementById('btnExportAll').style.display = 'none';
  }
  loadPatients();
}

// ── PATIENTS ──
function loadPatients() {
  const q = query(collection(db, 'patients'), orderBy('createdAt', 'desc'));
  onSnapshot(q, snap => {
    PATIENTS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderList();
  });
}

window.renderList = () => {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const pts = PATIENTS.filter(p =>
    p.name.toLowerCase().includes(q) ||
    (p.visits||[]).flatMap(v => (v.regions||[]).map(r => r.region + ' ' + (r.diagnoses||[]).join(' '))).join(' ').toLowerCase().includes(q)
  );
  document.getElementById('pcnt').textContent = `${PATIENTS.length} patient${PATIENTS.length!==1?'s':''}`;
  const g = document.getElementById('pgrid');
  if (!pts.length) {
    g.innerHTML = `<div class="empty" style="grid-column:1/-1"><span class="ico">👥</span><h3>${q?'No results':'No patients yet'}</h3><p>${q?'Try a different search':'Click New Patient to get started'}</p></div>`;
    return;
  }
  g.innerHTML = pts.map(p => {
    const visits  = p.visits || [];
    const initial = visits.find(v => v.type === 'initial');
    const fus     = visits.filter(v => v.type === 'followup');
    const regions = (initial?.regions||[]).map(r=>r.region).join(', ');
    const canEdit = CUR_USER.role === 'doctor';
    return `<div class="pcard">
      <div class="pcard-name">${p.name}</div>
      <span class="badge ${initial?'bdone':'bpend'}">${initial?'✅ Assessment Complete':'⏳ Pending Assessment'}</span>
      <div class="pcard-meta">
        <span>👤 ${p.age} y/o — ${p.gender||''}${p.job?' · '+p.job:''}</span>
        ${p.phone?`<span>📞 ${p.phone}</span>`:''}
        ${regions?`<span>📍 ${regions}</span>`:''}
        ${initial?`<span>📅 Initial: ${initial.date}</span>`:''}
        ${fus.length?`<span>🔄 ${fus.length} Follow-up${fus.length!==1?'s':''}</span>`:''}
      </div>
      <div class="pcard-actions">
        <button class="btn bp bs" onclick="openProfile('${p.id}')">📋 View</button>
        ${canEdit?`<button class="btn bg bs" onclick="openAssessment('${p.id}','initial')">✏️ Assessment</button>`:''}
        ${canEdit?`<button class="btn bd bs" onclick="askDel('${p.id}')">🗑️</button>`:''}
      </div>
    </div>`;
  }).join('');
};

// ── ADD PATIENT ──
window.openAdd = () => {
  ['iName','iAge','iJob','iPhone'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('iGender').value = 'Male';
  openM('moAdd');
};
window.saveNew = async () => {
  const name = document.getElementById('iName').value.trim();
  const age  = document.getElementById('iAge').value.trim();
  if (!name || !age) { toast('Name and age are required', true); return; }
  try {
    const ref = await addDoc(collection(db, 'patients'), {
      name, age,
      gender: document.getElementById('iGender').value,
      job:    document.getElementById('iJob').value.trim(),
      phone:  document.getElementById('iPhone').value.trim(),
      createdAt: Date.now(),
      createdBy: CUR_USER.uid,
      visits: [],
    });
    closeM('moAdd'); toast('Patient added ✅');
    if (CUR_USER.role === 'doctor') setTimeout(() => openAssessment(ref.id, 'initial'), 350);
  } catch(e) { toast('Error: ' + e.message, true); }
};

// ── OPTIONS ──
async function getOpts() {
  if (OPT_CACHE) return OPT_CACHE;
  const snap = await getDoc(doc(db, 'config', 'options'));
  OPT_CACHE = snap.exists() ? snap.data() : defaultOpts();
  return OPT_CACHE;
}
async function saveOpts(opts) { OPT_CACHE = opts; await setDoc(doc(db,'config','options'), opts); }

// ── OPEN ASSESSMENT (initial or follow-up) ──
window.openAssessment = async (pid, type, fuId = null) => {
  if (CUR_USER.role !== 'doctor') { toast('Doctor access only', true); return; }
  AS_PID   = pid;
  AS_TYPE  = type;
  AS_FU_ID = fuId;

  const p = PATIENTS.find(x => x.id === pid);
  if (!p) return;

  // Load existing data
  let existing = null;
  if (type === 'initial') {
    existing = (p.visits||[]).find(v => v.type === 'initial');
  } else if (fuId) {
    existing = (p.visits||[]).find(v => v.id === fuId);
  }

  if (existing) {
    AS_DATE     = existing.date || today();
    AS_REGIONS  = JSON.parse(JSON.stringify(existing.regions || []));
    AS_DURATION = existing.duration || '';
    AS_ONSET    = existing.onset || '';
    AS_NOTES    = existing.notes || '';
  } else {
    // for follow-up, pre-populate regions from initial
    AS_DATE     = today();
    AS_DURATION = '';
    AS_ONSET    = '';
    AS_NOTES    = '';
    if (type === 'followup') {
      const initial = (p.visits||[]).find(v => v.type === 'initial');
      AS_REGIONS = (initial?.regions||[]).map(r => ({
        region: r.region,
        diagnoses: [], complaints: [], findings: [], problems: [], treatment: [], vas: null, sessionsPlanned: '', freq: ''
      }));
    } else {
      AS_REGIONS = [];
    }
  }

  AS_CUR_REG = 0;
  const label = type === 'initial' ? 'Initial Assessment' : 'Follow-up';
  document.getElementById('assessTitle').textContent = `${label} — ${p.name}`;
  document.getElementById('assessBody').innerHTML = `<div class="loading"><div class="spinner"></div><span>Loading...</span></div>`;
  openM('moAssess');
  const opts = await getOpts();
  buildAssessForm(opts);
};

function buildAssessForm(opts) {
  const b = document.getElementById('assessBody');
  b.innerHTML = '';

  // Date
  const dateFG = document.createElement('div'); dateFG.className = 'fg';
  dateFG.innerHTML = '<label class="fl">Date</label>';
  const dateInp = document.createElement('input');
  dateInp.className = 'fc'; dateInp.type = 'date'; dateInp.id = 'as-date'; dateInp.value = AS_DATE;
  dateInp.addEventListener('change', () => AS_DATE = dateInp.value);
  dateFG.appendChild(dateInp); b.appendChild(dateFG);

  // Region tabs
  const tabsDiv = document.createElement('div');
  tabsDiv.id = 'as-tabs'; tabsDiv.className = 'rtabs';
  AS_REGIONS.forEach((r, i) => tabsDiv.appendChild(mkRegionTab(r.region, i)));
  const addBtn = document.createElement('button');
  addBtn.className = 'rtab-add'; addBtn.textContent = '+ Add Region';
  addBtn.onclick = () => showRegionPicker(opts);
  tabsDiv.appendChild(addBtn);
  b.appendChild(tabsDiv);

  // Region panels
  const panelsDiv = document.createElement('div'); panelsDiv.id = 'as-panels';
  AS_REGIONS.forEach((r, i) => panelsDiv.appendChild(mkRegionPanel(r, i, opts)));
  b.appendChild(panelsDiv);

  if (AS_REGIONS.length === 0) {
    const hint = document.createElement('p');
    hint.style.cssText = 'font-size:13px;color:var(--muted);padding:20px;text-align:center';
    hint.textContent = 'Click "+ Add Region" to start';
    panelsDiv.appendChild(hint);
  }

  // Duration & Onset
  b.appendChild(mkSdiv('⏱ Duration & Onset'));
  const durRow = document.createElement('div'); durRow.className = 'fr';
  const durFG = mkFGEl('Duration', mkInp('as-dur','e.g. 3 months', AS_DURATION));
  const onsFG = mkFGEl('Onset', mkSel('as-onset',['','Gradual','Sudden','Post-trauma','Post-surgical','Post-exercise','Unknown'], AS_ONSET));
  durRow.appendChild(durFG); durRow.appendChild(onsFG); b.appendChild(durRow);

  // Notes
  b.appendChild(mkSdiv('📝 Notes'));
  const ta = document.createElement('textarea');
  ta.className='fc'; ta.id='as-notes'; ta.rows=3; ta.placeholder='Clinical notes...'; ta.value=AS_NOTES;
  b.appendChild(ta);

  if (AS_REGIONS.length > 0) activateRegionTab(0);
}

function mkRegionTab(regionName, idx) {
  const btn = document.createElement('button');
  btn.className = 'rtab' + (idx === AS_CUR_REG ? ' on' : '');
  btn.dataset.idx = idx; btn.textContent = regionName;
  btn.onclick = () => activateRegionTab(idx);
  return btn;
}

function activateRegionTab(idx) {
  AS_CUR_REG = idx;
  document.querySelectorAll('#as-tabs .rtab').forEach((t,i) => t.classList.toggle('on', i===idx));
  document.querySelectorAll('#as-panels .region-panel').forEach((p,i) => p.classList.toggle('on', i===idx));
}

function mkRegionPanel(regionData, idx, opts) {
  const panel = document.createElement('div');
  panel.className = 'region-panel' + (idx === AS_CUR_REG ? ' on' : '');

  // Remove button
  const removeBtn = document.createElement('button');
  removeBtn.className = 'btn bd bs'; removeBtn.style.marginBottom = '12px';
  removeBtn.textContent = `🗑️ Remove ${regionData.region}`;
  removeBtn.onclick = () => removeRegion(idx, opts);
  panel.appendChild(removeBtn);

  const r = regionData.region;
  const sections = [
    ['🩺 Diagnosis',         'diagnoses',  opts.diagnoses[r]||[]],
    ['💬 Chief Complaints',  'complaints', opts.complaints[r]||[]],
    ['🔬 Assessment Findings','findings',  opts.findings[r]||[]],
    ['📌 Problem List',      'problems',   opts.problems],
    ['💊 Treatment Plan',    'treatment',  opts.treatment[r]||[]],
  ];
  sections.forEach(([title, key, allOpts]) => {
    panel.appendChild(mkSdiv(title));
    panel.appendChild(mkPillGroupWithAdd(key, allOpts, regionData[key]||[], key==='problems'?null:r, opts, idx));
  });

  // VAS
  panel.appendChild(mkSdiv('😣 Pain Level — VAS (0–10)'));
  panel.appendChild(mkVasEl(regionData.vas, idx));

  // Sessions
  panel.appendChild(mkSdiv('📅 Session Plan'));
  const sessRow = document.createElement('div'); sessRow.className = 'fr';
  sessRow.appendChild(mkFGEl('Sessions Planned', mkInp(`as-sess-${idx}`,'e.g. 12', regionData.sessionsPlanned||'','number')));
  sessRow.appendChild(mkFGEl('Frequency', mkSel(`as-freq-${idx}`,['','Daily','3x/week','2x/week','Weekly'], regionData.freq||'')));
  panel.appendChild(sessRow);

  return panel;
}

function showRegionPicker(opts) {
  const existing  = AS_REGIONS.map(r => r.region);
  const available = opts.regions.filter(r => !existing.includes(r));
  if (!available.length) { toast('All regions already added', true); return; }
  const picker = document.createElement('div');
  picker.style.cssText = 'position:fixed;inset:0;background:rgba(13,61,46,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';
  picker.id = 'regionPicker';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:14px;padding:24px;max-width:440px;width:100%;box-shadow:0 8px 36px rgba(13,61,46,.2)';
  box.innerHTML = `<div style="font-family:'DM Serif Display',serif;font-size:18px;color:#0d3d2e;margin-bottom:16px">Select Region</div>`;
  const pg = document.createElement('div'); pg.className = 'pill-group';
  available.forEach(r => {
    const btn = document.createElement('button'); btn.type='button'; btn.className='pill';
    btn.textContent = r;
    btn.onclick = () => { addRegion(r, opts); document.getElementById('regionPicker')?.remove(); };
    pg.appendChild(btn);
  });
  box.appendChild(pg);
  const cancel = document.createElement('button');
  cancel.className = 'btn bg bs'; cancel.style.marginTop='16px'; cancel.textContent='Cancel';
  cancel.onclick = () => picker.remove();
  box.appendChild(cancel);
  picker.appendChild(box); document.body.appendChild(picker);
}

function addRegion(regionName, opts) {
  AS_REGIONS.push({ region: regionName, diagnoses:[], complaints:[], findings:[], problems:[], treatment:[], vas:null, sessionsPlanned:'', freq:'' });
  const idx = AS_REGIONS.length - 1;
  const tabsDiv = document.getElementById('as-tabs');
  const addBtn  = tabsDiv.querySelector('.rtab-add');
  tabsDiv.insertBefore(mkRegionTab(regionName, idx), addBtn);
  document.getElementById('as-panels').appendChild(mkRegionPanel(AS_REGIONS[idx], idx, opts));
  activateRegionTab(idx);
}

function removeRegion(idx, opts) {
  AS_REGIONS.splice(idx, 1);
  buildAssessForm(opts);
}

window.saveAssess = async () => {
  AS_DATE     = document.getElementById('as-date')?.value || today();
  AS_DURATION = document.getElementById('as-dur')?.value.trim() || '';
  AS_ONSET    = document.getElementById('as-onset')?.value || '';
  AS_NOTES    = document.getElementById('as-notes')?.value.trim() || '';
  AS_REGIONS.forEach((r, i) => {
    r.sessionsPlanned = document.getElementById(`as-sess-${i}`)?.value || '';
    r.freq = document.getElementById(`as-freq-${i}`)?.value || '';
  });
  const visitData = {
    id:       AS_FU_ID || uid(),
    type:     AS_TYPE,
    date:     AS_DATE,
    duration: AS_DURATION,
    onset:    AS_ONSET,
    notes:    AS_NOTES,
    regions:  AS_REGIONS,
    savedAt:  Date.now(),
  };
  try {
    const p = PATIENTS.find(x => x.id === AS_PID);
    let visits = [...(p.visits || [])];
    if (AS_TYPE === 'initial') {
      // replace or add initial
      const idx = visits.findIndex(v => v.type === 'initial');
      if (idx >= 0) visits[idx] = visitData;
      else visits.unshift(visitData);
    } else {
      // replace or add followup
      const idx = visits.findIndex(v => v.id === visitData.id);
      if (idx >= 0) visits[idx] = visitData;
      else visits.push(visitData);
    }
    await updateDoc(doc(db,'patients',AS_PID), { visits });
    closeM('moAssess'); toast('Saved ✅'); openProfile(AS_PID);
  } catch(e) { toast('Error: ' + e.message, true); }
};

// ── PROFILE ──
window.openProfile = (pid) => {
  const p = PATIENTS.find(x => x.id === pid); if (!p) return;
  const canEdit = CUR_USER.role === 'doctor';
  const pills   = (arr, cls) => (arr||[]).map(x=>`<span class="atag ${cls||''}">${x}</span>`).join('');
  const visits  = [...(p.visits||[])].sort((a,b) => {
    if (a.type==='initial') return -1;
    if (b.type==='initial') return 1;
    return a.date > b.date ? -1 : 1;
  });
  const initial = visits.find(v => v.type === 'initial');
  const fus     = visits.filter(v => v.type === 'followup');

  let html = `
    <button class="btn bg bs no-print" onclick="goPage('patients')" style="margin-bottom:14px">← Back</button>
    <div class="profhd no-print">
      <div>
        <div class="profname">${p.name}</div>
        <div style="opacity:.8;font-size:14px">${p.age} y/o — ${p.gender||''}${p.job?' · '+p.job:''}${p.phone?' · '+p.phone:''}</div>
        <div class="proftags">
          ${(initial?.regions||[]).map(r=>`<span class="ptag gold">${r.region}</span>`).join('')}
          ${initial?`<span class="ptag">📅 ${initial.date}</span>`:''}
          ${fus.length?`<span class="ptag">🔄 ${fus.length} Follow-up${fus.length!==1?'s':''}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${canEdit?`<button class="btn ba bs" onclick="openAssessment('${p.id}','initial')">✏️ Edit Assessment</button>`:''}
        ${canEdit?`<button class="btn bp bs" onclick="openAssessment('${p.id}','followup')">+ Follow-up</button>`:''}
        ${canEdit?`<button class="btn bpdf bs" onclick="exportPDF('${p.id}')">📄 PDF</button>`:''}
        ${canEdit?`<button class="btn bcsv bs" onclick="exportCSV('${p.id}')">📊 CSV</button>`:''}
      </div>
    </div>`;

  if (!initial) {
    html += `<div class="card" style="text-align:center;padding:44px;color:var(--muted)">
      <div style="font-size:42px;margin-bottom:12px">📋</div>
      <p style="font-weight:600">No assessment yet</p>
      ${canEdit?`<button class="btn bp" style="margin-top:16px" onclick="openAssessment('${p.id}','initial')">Start Assessment</button>`:''}
    </div>`;
  } else {
    // render all visits
    visits.forEach(v => {
      const isInitial = v.type === 'initial';
      html += `<div class="visit-card ${isInitial?'':'followup'}">
        ${canEdit && !isInitial ? `<button class="visit-del no-print" onclick="askDelVisit('${p.id}','${v.id}')">🗑️</button>` : ''}
        ${canEdit && !isInitial ? `<button class="btn bg bs no-print" style="position:absolute;top:14px;right:42px;padding:4px 10px;font-size:12px" onclick="openAssessment('${p.id}','followup','${v.id}')">✏️</button>` : ''}
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
          <span class="visit-label ${isInitial?'initial':'followup'}">${isInitial?'📋 Initial Assessment':'🔄 Follow-up'}</span>
          <span style="font-size:13px;color:var(--muted);font-weight:600">📅 ${v.date}</span>
          ${v.duration?`<span style="font-size:13px;color:var(--muted)">⏱ ${v.duration}${v.onset?' — '+v.onset:''}</span>`:''}
        </div>`;

      (v.regions||[]).forEach(r => {
        html += `<div class="region-card">
          <div class="region-title">📍 ${r.region}${r.sessionsPlanned?` <span style="font-size:12px;color:var(--muted);font-weight:500">💪 ${r.sessionsPlanned}${r.freq?' · '+r.freq:''}</span>`:''}</div>`;
        if (r.diagnoses?.length)  html += `<div class="asec"><div class="asec-ttl">🩺 Diagnosis</div><div class="atags">${pills(r.diagnoses,'key')}</div></div>`;
        if (r.complaints?.length) html += `<div class="asec"><div class="asec-ttl">💬 Complaints</div><div class="atags">${pills(r.complaints)}</div></div>`;
        if (r.vas != null) {
          const c = r.vas<=3?'#27ae60':r.vas<=6?'#e8a020':'#d94f4f';
          html += `<div class="asec"><div class="asec-ttl">😣 VAS</div>
            <div style="display:inline-flex;align-items:center;gap:10px;background:var(--bg);padding:8px 16px;border-radius:24px">
              <span style="font-size:24px;font-weight:700;color:${c}">${r.vas}</span><span style="color:var(--muted);font-size:13px">/10</span>
              <div style="height:6px;width:100px;background:#ddd;border-radius:6px;overflow:hidden"><div style="height:100%;width:${r.vas*10}%;background:${c}"></div></div>
            </div></div>`;
        }
        if (r.findings?.length)  html += `<div class="asec"><div class="asec-ttl">🔬 Findings</div><div class="atags">${pills(r.findings)}</div></div>`;
        if (r.problems?.length)  html += `<div class="asec"><div class="asec-ttl">📌 Problem List</div><div class="atags">${pills(r.problems,'red')}</div></div>`;
        if (r.treatment?.length) html += `<div class="asec"><div class="asec-ttl">💊 Treatment</div><div class="atags">${pills(r.treatment)}</div></div>`;
        html += `</div>`;
      });

      if (v.notes) html += `<div style="font-size:13px;background:var(--bg);padding:10px;border-radius:var(--rs);margin-top:8px">${v.notes}</div>`;
      html += `</div>`;
    });
  }

  document.getElementById('pg-profile').innerHTML = html;
  goPage('profile');
};

// ── DELETE VISIT ──
window.askDelVisit = (pid, visitId) => {
  document.getElementById('confTitle').textContent = 'Delete Follow-up';
  document.getElementById('confMsg').textContent   = 'Delete this follow-up? Cannot be undone.';
  document.getElementById('confBtn').onclick = async () => {
    const p = PATIENTS.find(x => x.id === pid);
    await updateDoc(doc(db,'patients',pid), { visits: (p.visits||[]).filter(v => v.id !== visitId) });
    toast('Deleted'); closeConf(); openProfile(pid);
  };
  document.getElementById('confO').classList.add('open');
};

// ── DELETE PATIENT ──
window.askDel = (pid) => {
  const p = PATIENTS.find(x => x.id === pid);
  document.getElementById('confTitle').textContent = 'Delete Patient';

    <div style="margin-bottom:10px">
      <div style="font-size:10px;font-weight:700;color:#1a5c4a;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px">${t}</div>

      <div style="font-size:14px;font-weight:700;color:#162820;margin-top:4px">${p.name}</div>
      <div style="font-size:12px;color:#5a7a6e;margin-top:2px">${p.age} y/o — ${p.gender||''}${p.job?' · '+p.job:''}${p.phone?' · '+p.phone:''}</div>
    </div>`;

  visits.forEach(v => {
    const isInitial = v.type === 'initial';
    content += `<div style="margin-bottom:20px;border-left:3px solid ${isInitial?'#1a5c4a':'#e8a020'};padding-left:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="background:${isInitial?'#eafaf1':'#fff3cd'};color:${isInitial?'#27ae60':'#b07a00'};padding:2px 10px;border-radius:14px;font-size:11px;font-weight:700">${isInitial?'Initial Assessment':'Follow-up'}</span>
        <span style="font-size:12px;font-weight:600;color:#5a7a6e">📅 ${v.date}</span>
        ${v.duration?`<span style="font-size:11px;color:#5a7a6e">⏱ ${v.duration}${v.onset?' — '+v.onset:''}</span>`:''}
      </div>`;
    (v.regions||[]).forEach(r => {
      content += `<div style="background:#f8faf9;border-radius:6px;padding:12px;margin-bottom:8px;border-right:3px solid #1a5c4a">
        <div style="font-weight:700;color:#0d3d2e;font-size:12px;margin-bottom:8px">📍 ${r.region}${r.sessionsPlanned?` <span style="font-size:10px;color:#5a7a6e;font-weight:400">— ${r.sessionsPlanned} sessions${r.freq?' · '+r.freq:''}</span>`:''}</div>
        ${sec('Diagnosis', r.diagnoses, 'key')}
        ${sec('Chief Complaints', r.complaints)}
        ${r.vas!=null?`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:#1a5c4a;text-transform:uppercase;margin-bottom:4px">Pain Level (VAS)</div><span style="font-size:18px;font-weight:700;color:${r.vas<=3?'#27ae60':r.vas<=6?'#e8a020':'#d94f4f'}">${r.vas}/10</span></div>`:''}
        ${sec('Assessment Findings', r.findings)}
        ${sec('Problem List', r.problems, 'red')}
        ${sec('Treatment Plan', r.treatment)}
      </div>`;
    });
    if (v.notes) content += `<div style="font-size:11px;color:#5a7a6e;font-style:italic;margin-top:4px;padding:6px 10px;background:#f8faf9;border-radius:5px">📝 ${v.notes}</div>`;
    content += `</div>`;
  });
  content += `<div style="margin-top:24px;padding-top:10px;border-top:1px solid #d0e4de;font-size:10px;color:#5a7a6e;text-align:center">Generated by Physiclinic PT Archive · ${today()}</div></div>`;

  // Create hidden div, render, then use print dialog to save as PDF
  const div = document.createElement('div');
  div.innerHTML = content;
  div.style.cssText = 'position:fixed;left:-9999px;top:0;background:#fff;width:750px';
  document.body.appendChild(div);

  // Load html2canvas + jsPDF
  if (!window.html2canvas) {
    const s1 = document.createElement('script');
    s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    document.head.appendChild(s1);
    await new Promise(r => s1.onload = r);
  }
  if (!window.jspdf) {
    const s2 = document.createElement('script');
    s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    document.head.appendChild(s2);
    await new Promise(r => s2.onload = r);
  }

  try {
    const canvas = await html2canvas(div, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgW  = pageW - 20;
    const imgH  = (canvas.height * imgW) / canvas.width;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    let y = 10;
    let remaining = imgH;
    let srcY = 0;
    while (remaining > 0) {
      const sliceH = Math.min(remaining, pageH - 20);
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width  = canvas.width;
      sliceCanvas.height = (sliceH / imgH) * canvas.height;
      const ctx = sliceCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, srcY * canvas.height / imgH, canvas.width, sliceCanvas.height, 0, 0, canvas.width, sliceCanvas.height);
      if (srcY > 0) pdf.addPage();
      pdf.addImage(sliceCanvas.toDataURL('image/jpeg', 0.95), 'JPEG', 10, y, imgW, sliceH);
      remaining -= sliceH;
      srcY += sliceH;
      y = 10;
    }
    pdf.save(`PT_${p.name.replace(/\s+/g,'_')}_${today()}.pdf`);
    toast('PDF downloaded ✅');
  } catch(e) {
    toast('PDF error: ' + e.message, true);
  } finally {
    document.body.removeChild(div);
  }
};
};

function csvEscape(v){
  if(v==null||v==='') return '';
  const s=String(v).replace(/\r\n|\r|\n/g,' ');
  if(s.includes(',')||s.includes('"')) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function csvDL(filename, rows){
  const csv = rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
}

window.mgAdd = async () => {
  const val = document.getElementById('mg-inp')?.value?.trim(); if(!val) return;
  const opts = await getOpts();

  else if(MG_TAB==='problems'){if(!opts.problems.includes(val))opts.problems.push(val);}
  else{const sel=document.getElementById('mgBody').dataset.selReg||opts.regions[0];if(!opts[MG_TAB][sel])opts[MG_TAB][sel]=[];if(!opts[MG_TAB][sel].includes(val))opts[MG_TAB][sel].push(val);}
  await saveOpts(opts); toast('Added ✅'); renderMgBody();
};
window.delOpt = async (cat, region, val) => {
  const opts = await getOpts();
  if(cat==='regions')opts.regions=opts.regions.filter(x=>x!==val);
  else if(cat==='problems')opts.problems=opts.problems.filter(x=>x!==val);
  else if(region&&opts[cat]?.[region])opts[cat][region]=opts[cat][region].filter(x=>x!==val);
  await saveOpts(opts); toast('Removed'); renderMgBody();
};

function mkSel(id,opts,val){
  const s=document.createElement('select');s.className='fc';s.id=id;

function mkFGEl(label, el){ const w=document.createElement('div');w.className='fg'; const l=document.createElement('label');l.className='fl';l.textContent=label;w.appendChild(l);w.appendChild(el);return w; }
function mkOnePill(key, opt, selected, regionIdx){
  const b=document.createElement('button');b.type='button';b.className='pill'+(selected?' sel':'');b.textContent=opt;
  b.addEventListener('click',function(){
    if(!AS_REGIONS[regionIdx][key])AS_REGIONS[regionIdx][key]=[];
    if(AS_REGIONS[regionIdx][key].includes(opt)){AS_REGIONS[regionIdx][key]=AS_REGIONS[regionIdx][key].filter(x=>x!==opt);this.classList.remove('sel');}
    else{AS_REGIONS[regionIdx][key].push(opt);this.classList.add('sel');}
  });
  return b;
}
function mkPillGroupWithAdd(key, allOpts, selected, region, opts, regionIdx){
  const wrap=document.createElement('div');
  const pg=document.createElement('div');pg.className='pill-group';
  allOpts.forEach(opt=>pg.appendChild(mkOnePill(key,opt,selected.includes(opt),regionIdx)));
  wrap.appendChild(pg);
  const row=document.createElement('div');row.className='add-row';
  const inp=document.createElement('input');inp.type='text';inp.placeholder='Add new option (saves permanently)...';
  const btn=document.createElement('button');btn.type='button';btn.textContent='+ Add';
  btn.addEventListener('click',async()=>{
    const val=inp.value.trim();if(!val){toast('Type an option first',true);return;}
    if(region&&opts[key]&&opts[key][region]!==undefined){if(!opts[key][region].includes(val))opts[key][region].push(val);}
    else if(key==='problems'){if(!opts.problems.includes(val))opts.problems.push(val);}
    await saveOpts(opts);
    if(!AS_REGIONS[regionIdx][key])AS_REGIONS[regionIdx][key]=[];
    if(!AS_REGIONS[regionIdx][key].includes(val))AS_REGIONS[regionIdx][key].push(val);
    pg.appendChild(mkOnePill(key,val,true,regionIdx));
    inp.value='';toast('Option added ✅');
  });
  row.appendChild(inp);row.appendChild(btn);wrap.appendChild(row);return wrap;
}
function mkVasEl(currentVal, regionIdx){
  const w=document.createElement('div');w.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-top:4px';
  for(let i=0;i<=10;i++){

  }
  return w;
}
