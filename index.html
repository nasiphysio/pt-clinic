<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physiclinic</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --p:#1a5c4a;--pl:#22776a;--pd:#0d3d2e;
  --acc:#e8a020;--bg:#eef2f0;--card:#fff;
  --txt:#162820;--muted:#5a7a6e;--border:#ccddd6;
  --red:#d94f4f;--redl:#fdeaea;
  --green:#27ae60;--greenl:#eafaf1;
  --sh:0 2px 14px rgba(13,61,46,.09);
  --shl:0 8px 36px rgba(13,61,46,.15);
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:15px}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--pd)}
.lbox{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:380px;box-shadow:var(--shl)}
.lbox h1{font-size:26px;font-weight:700;color:var(--pd);margin-bottom:4px;text-align:center}
.lbox p{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
.lerr{background:var(--redl);color:var(--red);padding:10px 14px;border-radius:var(--rs);font-size:13px;margin-bottom:14px;display:none}

/* APP */
#appScreen{display:none}
.wrap{display:flex;min-height:100vh}
.side{width:230px;background:var(--pd);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.slogo{padding:22px 18px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.slogo h2{color:#fff;font-size:17px;font-weight:700}
.slogo span{color:rgba(255,255,255,.4);font-size:11px}
.suser{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.1)}
.suser strong{color:#fff;display:block;font-size:13px;font-weight:700}
.suser small{color:rgba(255,255,255,.5);font-size:11px}
.snav{padding:12px 10px;flex:1;display:flex;flex-direction:column;gap:3px}
.ni{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:var(--rs);color:rgba(255,255,255,.6);cursor:pointer;font-size:14px;font-weight:500;border:none;background:none;width:100%;text-align:left;transition:all .2s}
.ni:hover{background:rgba(255,255,255,.1);color:#fff}
.ni.on{background:var(--acc);color:var(--pd);font-weight:700}
.ni.locked{opacity:.35;cursor:not-allowed}
.ni.locked:hover{background:none;color:rgba(255,255,255,.6)}
.sfooter{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1)}
.signout{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.12);border-radius:var(--rs);padding:10px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:all .2s}
.signout:hover{background:var(--red);color:#fff;border-color:var(--red)}
.main{margin-left:230px;flex:1;padding:28px}

/* COMMON */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.pt{font-size:22px;font-weight:700;color:var(--pd)}
.ps{font-size:13px;color:var(--muted);margin-top:2px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:22px}

/* PATIENT GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.pcard{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;border:2px solid transparent;transition:all .2s;position:relative;overflow:hidden}
.pcard::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--p)}
.pcard:hover{box-shadow:var(--shl);border-color:var(--p);transform:translateY(-2px)}
.pname{font-size:16px;font-weight:700;color:var(--pd);margin-bottom:4px}
.pmeta{font-size:13px;color:var(--muted);display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:8px}
.bdone{background:var(--greenl);color:var(--green)}
.bpend{background:#fff8e6;color:#b07a00}
.pactions{display:flex;gap:7px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}

/* SEARCH */
.sbar{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:var(--rs);padding:10px 14px;box-shadow:var(--sh);border:1.5px solid var(--border);margin-bottom:16px}
.sbar input{border:none;outline:none;flex:1;font-family:'DM Sans',sans-serif;font-size:14px;background:transparent}
.sbar input::placeholder{color:var(--muted)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.bp{background:var(--p);color:#fff}.bp:hover{background:var(--pl)}
.ba{background:var(--acc);color:var(--pd)}.ba:hover{opacity:.9}
.bd{background:var(--redl);color:var(--red)}.bd:hover{background:var(--red);color:#fff}
.bg{background:transparent;color:var(--muted);border:1.5px solid var(--border)}.bg:hover{border-color:var(--p);color:var(--p)}
.bpdf{background:#c0392b;color:#fff}.bpdf:hover{background:#a93226}
.bcsv{background:#1d6f42;color:#fff}.bcsv:hover{background:#155235}
.bs{padding:6px 12px;font-size:13px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(13,61,46,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s}
.mo.open{opacity:1;pointer-events:all}
.mdl{background:#fff;border-radius:var(--r);width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:var(--shl);transform:translateY(24px);transition:transform .25s}
.mo.open .mdl{transform:translateY(0)}
.mhd{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.mtt{font-size:17px;font-weight:700;color:var(--pd)}
.mcl{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)}
.mbody{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.mft{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.fc{border:1.5px solid var(--border);border-radius:var(--rs);padding:9px 13px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt);outline:none;transition:border-color .2s;background:var(--bg);width:100%}
.fc:focus{border-color:var(--p);background:#fff}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sdiv{background:linear-gradient(90deg,var(--pd),var(--p));color:#fff;padding:8px 15px;border-radius:var(--rs);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin:4px 0 5px}

/* REGION TABS */
.rtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.rtab{padding:7px 15px;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:var(--bg);color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .2s}
.rtab.on{background:var(--p);color:#fff;border-color:var(--p)}
.rtab-add{padding:7px 13px;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer;border:2px dashed var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .2s}
.rtab-add:hover{border-color:var(--p);color:var(--p)}
.rpanel{display:none}.rpanel.on{display:block}

/* PILLS */
.pg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.pill{display:inline-flex;align-items:center;padding:6px 14px;border-radius:22px;border:2px solid var(--border);background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;-webkit-appearance:none;appearance:none}
.pill:hover{border-color:var(--p);background:#e0ede8;color:var(--p)}
.pill.sel{background:var(--p)!important;color:#fff!important;border-color:var(--p)!important;font-weight:700}
.pill.sel::before{content:"✓ "}
.addrow{display:flex;gap:8px;margin-top:8px}
.addrow input{flex:1;border:1.5px dashed var(--border);border-radius:22px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;background:transparent}
.addrow input:focus{border-color:var(--p)}
.addrow button{background:var(--p);color:#fff;border:none;border-radius:22px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}

/* VAS */
.vas-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);font-weight:700;font-size:12px;cursor:pointer;background:var(--bg);font-family:'DM Sans',sans-serif;transition:all .18s;color:var(--txt)}
.vas-btn.sel{background:var(--p);color:#fff;border-color:var(--p);transform:scale(1.15)}

/* PROFILE */
.profhd{background:linear-gradient(135deg,var(--pd),var(--pl));border-radius:var(--r);padding:22px;color:#fff;margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.profname{font-size:20px;font-weight:700;margin-bottom:3px}
.proftags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ptag{background:rgba(255,255,255,.15);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:500}
.ptag.gold{background:var(--acc);color:var(--pd);font-weight:700}

/* VISIT CARD */
.vcard{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:14px;border-top:3px solid var(--p);position:relative}
.vcard.fu{border-top-color:var(--acc)}
.vlabel{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px}
.vlabel.ini{background:var(--greenl);color:var(--green)}
.vlabel.fup{background:#fff3cd;color:#b07a00}
.vdel{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px}
.vdel:hover{color:var(--red)}
.vedit{position:absolute;top:12px;right:40px;background:none;border:1.5px solid var(--border);color:var(--muted);cursor:pointer;font-size:12px;padding:3px 8px;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:600}
.vedit:hover{border-color:var(--p);color:var(--p)}
.rcard{background:var(--bg);border-radius:var(--rs);padding:14px;margin-bottom:10px;border-left:3px solid var(--p)}
.rtitle{font-size:14px;font-weight:700;color:var(--pd);margin-bottom:10px}
.asec{margin-bottom:12px}
.attl{font-size:10px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px}
.atags{display:flex;flex-wrap:wrap;gap:6px}
.atag{background:var(--bg);border:1.5px solid var(--border);padding:3px 11px;border-radius:20px;font-size:12px;font-weight:500}
.atag.key{background:var(--greenl);border-color:var(--green);color:#1a6b40}
.atag.red{background:var(--redl);border-color:var(--red);color:var(--red)}

/* CONFIRM */
.conf-o{position:fixed;inset:0;background:rgba(13,61,46,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s}
.conf-o.open{opacity:1;pointer-events:all}
.conf-b{background:#fff;border-radius:var(--r);padding:26px;max-width:320px;width:100%;text-align:center;box-shadow:var(--shl);transform:scale(.9);transition:transform .2s}
.conf-o.open .conf-b{transform:scale(1)}

/* MANAGE */
.optlist{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto}
.optrow{display:flex;align-items:center;gap:8px;background:var(--bg);padding:8px 12px;border-radius:var(--rs)}
.optrow span{flex:1;font-size:14px}
.optdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}
.optdel:hover{background:var(--redl);color:var(--red)}
.mtabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.mtab{padding:6px 13px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:none;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .2s}
.mtab.on{background:var(--p);color:#fff;border-color:var(--p)}
.nbox{background:#f0f7f4;border-left:3px solid var(--p);padding:10px 14px;border-radius:0 var(--rs) var(--rs) 0;font-size:13px;color:var(--muted)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:50px;flex-direction:column;gap:12px;color:var(--muted)}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--pd);color:#fff;padding:11px 18px;border-radius:var(--rs);font-size:14px;font-weight:600;z-index:999;transform:translateY(80px);transition:transform .3s;box-shadow:var(--shl)}
.toast.show{transform:translateY(0)}
.toast.err{background:var(--red)}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ico{font-size:42px;display:block;margin-bottom:10px}

/* MOBILE */
.mtoggle{display:none;position:fixed;top:12px;left:12px;z-index:300;background:var(--pd);color:#fff;border:none;border-radius:var(--rs);padding:9px 11px;font-size:18px;cursor:pointer}
.ovcl{display:none}
@media(max-width:768px){
  .side{transform:translateX(-100%)}.side.open{transform:translateX(0)}
  .main{margin-left:0;padding:14px;padding-top:56px}
  .mtoggle{display:block}
  .ovcl{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
  .fr{grid-template-columns:1fr}.pgrid{grid-template-columns:1fr}
  .lbox{padding:32px 22px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lbox">
    <h1>Physiclinic</h1>
    <p>PT Patient Archive — Ortho</p>
    <div class="lerr" id="lerr"></div>
    <div class="fg" style="margin-bottom:12px">
      <label class="fl">Email</label>
      <input class="fc" type="email" id="lEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fg" style="margin-bottom:22px">
      <label class="fl">Password</label>
      <input class="fc" type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn bp" id="loginBtn" style="width:100%;justify-content:center;padding:12px" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <button class="mtoggle" onclick="toggleSide()">☰</button>
  <div class="ovcl" id="ovcl" onclick="toggleSide()"></div>
  <div class="wrap">
    <aside class="side" id="side">
      <div class="slogo"><h2>Physiclinic</h2><span>PT Patient Archive</span></div>
      <div class="suser"><strong id="suName">...</strong><small id="suRole">...</small></div>
      <nav class="snav">
        <button class="ni on" onclick="goPage('patients')">👥 Patients</button>
        <button class="ni" id="navManage" onclick="goPage('manage')">⚙️ Manage Options</button>
        <button class="ni" id="navUsers" onclick="goPage('users')">👤 Manage Users</button>
      </nav>
      <div class="sfooter">
        <button class="signout" onclick="doLogout()">⇠ Sign Out</button>
      </div>
    </aside>
    <main class="main">
      <div id="pg-patients">
        <div class="ph">
          <div><div class="pt">Patient Archive</div><div class="ps" id="pcnt"></div></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn bcsv" id="btnAll" onclick="exportAll()">📊 Export All</button>
            <button class="btn bp" onclick="openAdd()">+ New Patient</button>
          </div>
        </div>
        <div class="sbar"><span style="color:var(--muted)">🔍</span><input type="text" id="srch" placeholder="Search..." oninput="renderList()"></div>
        <div class="pgrid" id="pgrid"></div>
      </div>
      <div id="pg-manage" style="display:none">
        <div class="ph"><div><div class="pt">Manage Options</div><div class="ps">Add or remove options from lists</div></div></div>
        <div class="card"><div class="mtabs" id="mgTabs"></div><div id="mgBody"></div></div>
      </div>
      <div id="pg-users" style="display:none">
        <div class="ph"><div><div class="pt">Manage Users</div></div></div>
        <div class="card" id="usersBody"></div>
      </div>
      <div id="pg-profile" style="display:none"></div>
    </main>
  </div>
</div>

<!-- MODAL: NEW PATIENT -->
<div class="mo" id="moAdd">
  <div class="mdl" style="max-width:460px">
    <div class="mhd"><div class="mtt">New Patient</div><button class="mcl" onclick="closeM('moAdd')">✕</button></div>
    <div class="mbody">
      <div class="nbox">📝 Basic info — entered by receptionist</div>
      <div class="fr">
        <div class="fg"><label class="fl">Full Name *</label><input class="fc" id="iName" placeholder="Patient name"></div>
        <div class="fg"><label class="fl">Age *</label><input class="fc" id="iAge" type="number" placeholder="Age"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Gender</label><select class="fc" id="iGender"><option>Male</option><option>Female</option></select></div>
        <div class="fg"><label class="fl">Occupation</label><input class="fc" id="iJob" placeholder="e.g. Office worker"></div>
      </div>
      <div class="fg"><label class="fl">Phone</label><input class="fc" id="iPhone" placeholder="Phone number"></div>
    </div>
    <div class="mft">
      <button class="btn bg" onclick="closeM('moAdd')">Cancel</button>
      <button class="btn bp" onclick="saveNew()">Save Patient</button>
    </div>
  </div>
</div>

<!-- MODAL: ASSESSMENT -->
<div class="mo" id="moAssess">
  <div class="mdl">
    <div class="mhd"><div class="mtt" id="assessTtl">Assessment</div><button class="mcl" onclick="closeM('moAssess')">✕</button></div>
    <div class="mbody" id="assessBody"></div>
    <div class="mft">
      <button class="btn bg" onclick="closeM('moAssess')">Cancel</button>
      <button class="btn bp" onclick="saveAssess()">💾 Save</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD USER -->
<div class="mo" id="moUser">
  <div class="mdl" style="max-width:430px">
    <div class="mhd"><div class="mtt">Add Staff Account</div><button class="mcl" onclick="closeM('moUser')">✕</button></div>
    <div class="mbody">
      <div class="fg"><label class="fl">Full Name</label><input class="fc" id="uName" placeholder="Staff name"></div>
      <div class="fg"><label class="fl">Email *</label><input class="fc" id="uEmail" type="email" placeholder="email@example.com"></div>
      <div class="fg"><label class="fl">Password *</label><input class="fc" id="uPass" type="password" placeholder="Min 6 characters"></div>
      <div class="fg"><label class="fl">Role</label>
        <select class="fc" id="uRole">
          <option value="doctor">Doctor (Full Access)</option>
          <option value="receptionist">Receptionist (Add patients only)</option>
        </select>
      </div>
    </div>
    <div class="mft">
      <button class="btn bg" onclick="closeM('moUser')">Cancel</button>
      <button class="btn bp" onclick="saveUser()">Create Account</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="conf-o" id="confO">
  <div class="conf-b">
    <div style="font-size:34px;margin-bottom:10px">⚠️</div>
    <div style="font-size:16px;font-weight:700;color:var(--pd);margin-bottom:7px" id="confTitle">Confirm</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:18px" id="confMsg"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn bg bs" onclick="closeConf()">Cancel</button>
      <button class="btn bd bs" id="confBtn">Delete</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── CONFIG ──
const app  = initializeApp({

// ── AUTH ──
window.doLogin = async () => {
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in...'; btn.disabled = true;
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  const err   = document.getElementById('lerr');
  err.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.textContent = 'Invalid email or password';
    err.style.display = 'block';
  } finally {
    btn.textContent = 'Sign In →'; btn.disabled = false;
  }
};

window.doLogout = async () => {
  await signOut(auth);
  PTS = []; OPTS = null; ME = null;
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('lEmail').value = '';
  document.getElementById('lPass').value = '';
  document.getElementById('lerr').style.display = 'none';
};

onAuthStateChanged(auth, async user => {
  if (!user) return;
  const snap = await getDoc(doc(db, 'users', user.uid));
  ME = snap.exists() ? { uid:user.uid, email:user.email, ...snap.data() }
                     : { uid:user.uid, email:user.email, name:user.email, role:'doctor' };
  if (!snap.exists()) await setDoc(doc(db,'users',user.uid), { name:user.email, role:'doctor', email:user.email });
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('suName').textContent = ME.name || ME.email;
  document.getElementById('suRole').textContent = ME.role==='doctor' ? '👨‍⚕️ Doctor' : '🗂️ Receptionist';
  if (ME.role !== 'doctor') {
    ['navManage','navUsers'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.add('locked');
      el.onclick = () => toast('Doctor access only', true);
    });
    document.getElementById('btnAll').style.display = 'none';
  }
  loadPts();
});

// ── PATIENTS ──
function loadPts() {
  onSnapshot(query(collection(db,'patients'), orderBy('createdAt','desc')), snap => {
    PTS = snap.docs.map(d => ({id:d.id,...d.data()}));
    renderList();
  });
}

window.renderList = () => {
  const q = (document.getElementById('srch')?.value||'').toLowerCase();
  const pts = PTS.filter(p =>
    p.name.toLowerCase().includes(q) ||
    (p.visits||[]).flatMap(v=>(v.regions||[]).map(r=>r.region+' '+(r.diagnoses||[]).join(' '))).join(' ').toLowerCase().includes(q)
  );
  document.getElementById('pcnt').textContent = `${PTS.length} patient${PTS.length!==1?'s':''}`;
  const g = document.getElementById('pgrid');
  if (!pts.length) {
    g.innerHTML=`<div class="empty" style="grid-column:1/-1"><span class="ico">👥</span><h3>${q?'No results':'No patients yet'}</h3></div>`;
    return;
  }
  g.innerHTML = pts.map(p => {
    const ini = (p.visits||[]).find(v=>v.type==='initial');
    const fus = (p.visits||[]).filter(v=>v.type==='followup');
    const regs = (ini?.regions||[]).map(r=>r.region).join(', ');
    const doc_ = ME.role==='doctor';
    return `<div class="pcard">
      <div class="pname">${p.name}</div>
      <span class="badge ${ini?'bdone':'bpend'}">${ini?'✅ Complete':'⏳ Pending'}</span>
      <div class="pmeta">
        <span>👤 ${p.age} y/o — ${p.gender||''}${p.job?' · '+p.job:''}</span>
        ${p.phone?`<span>📞 ${p.phone}</span>`:''}
        ${regs?`<span>📍 ${regs}</span>`:''}
        ${ini?`<span>📅 ${ini.date}</span>`:''}
        ${fus.length?`<span>🔄 ${fus.length} follow-up${fus.length>1?'s':''}</span>`:''}
      </div>
      <div class="pactions">
        <button class="btn bp bs" onclick="openProfile('${p.id}')">📋 View</button>
        ${doc_?`<button class="btn bg bs" onclick="openAssess('${p.id}','initial')">✏️ Assessment</button>`:''}
        ${doc_?`<button class="btn bd bs" onclick="askDel('${p.id}')">🗑️</button>`:''}
      </div>
    </div>`;
  }).join('');
};

window.saveNew = async () => {

      gender:document.getElementById('iGender').value,

};

// ── OPTIONS ──
async function getOpts(){
  if(OPTS)return OPTS;
  const snap=await getDoc(doc(db,'config','options'));
  OPTS=snap.exists()?snap.data():defOpts();
  return OPTS;
}
async function saveOpts(o){OPTS=o;await setDoc(doc(db,'config','options'),o);}

// ── ASSESSMENT ──
window.openAssess = async (pid, type, fuId=null) => {
  if(ME.role!=='doctor'){toast('Doctor access only',true);return;}
  AS_PID=pid; AS_TYPE=type; AS_FU_ID=fuId;
  const p=PTS.find(x=>x.id===pid);if(!p)return;
  let ex = fuId ? (p.visits||[]).find(v=>v.id===fuId) : type==='initial'?(p.visits||[]).find(v=>v.type==='initial'):null;
  if(ex){
    AS_DATE=ex.date||today(); AS_REGIONS=JSON.parse(JSON.stringify(ex.regions||[]));
    AS_DUR=ex.duration||''; AS_ONSET=ex.onset||''; AS_NOTES=ex.notes||'';
  } else {
    AS_DATE=today(); AS_DUR=''; AS_ONSET=''; AS_NOTES='';
    if(type==='followup'){
      const ini=(p.visits||[]).find(v=>v.type==='initial');
      AS_REGIONS=(ini?.regions||[]).map(r=>({region:r.region,diagnoses:[],complaints:[],findings:[],problems:[],treatment:[],vas:null,sessionsPlanned:'',freq:''}));
    } else { AS_REGIONS=[]; }
  }
  AS_CUR=0;
  document.getElementById('assessTtl').textContent=(type==='initial'?'Initial Assessment':'Follow-up')+' — '+p.name;
  document.getElementById('assessBody').innerHTML='<div class="loading"><div class="spin"></div><span>Loading...</span></div>';
  openM('moAssess');
  const opts=await getOpts();
  buildForm(opts);
};

function buildForm(opts){
  const b=document.getElementById('assessBody');
  b.innerHTML='';

  // Date
  const df=mk('div','fg'); df.innerHTML='<label class="fl">Date</label>';
  const di=mk('input','fc'); di.type='date'; di.id='as-date'; di.value=AS_DATE;
  di.onchange=()=>AS_DATE=di.value; df.appendChild(di); b.appendChild(df);

  // Region tabs
  const tabs=mk('div','rtabs'); tabs.id='as-tabs';
  AS_REGIONS.forEach((_,i)=>tabs.appendChild(mkRTab(AS_REGIONS[i].region,i)));
  const addTab=mk('button','rtab-add'); addTab.textContent='+ Add Region'; addTab.onclick=()=>showPicker(opts);
  tabs.appendChild(addTab); b.appendChild(tabs);

  // Panels
  const panels=mk('div',''); panels.id='as-panels';
  AS_REGIONS.forEach((_,i)=>panels.appendChild(mkPanel(AS_REGIONS[i],i,opts)));
  b.appendChild(panels);

  if(!AS_REGIONS.length){
    const h=mk('p',''); h.style.cssText='font-size:13px;color:var(--muted);padding:18px;text-align:center';
    h.textContent='Click "+ Add Region" to start'; panels.appendChild(h);
  }

  // Duration & Onset
  b.appendChild(mkSdiv('⏱ Duration & Onset'));
  const dr=mk('div','fr');
  dr.appendChild(mkFG('Duration',mkInp('as-dur','e.g. 3 months',AS_DUR)));
  dr.appendChild(mkFG('Onset',mkSel('as-onset',['','Gradual','Sudden','Post-trauma','Post-surgical','Post-exercise','Unknown'],AS_ONSET)));
  b.appendChild(dr);

  // Notes
  b.appendChild(mkSdiv('📝 Notes'));
  const ta=mk('textarea','fc'); ta.id='as-notes'; ta.rows=3; ta.placeholder='Clinical notes...'; ta.value=AS_NOTES;
  b.appendChild(ta);

  if(AS_REGIONS.length) activateTab(0);
}

function mkRTab(name,idx){
  const b=mk('button','rtab'+(idx===AS_CUR?' on':''));
  b.dataset.idx=idx; b.textContent=name;
  b.onclick=()=>activateTab(idx); return b;
}
function activateTab(idx){
  AS_CUR=idx;
  document.querySelectorAll('#as-tabs .rtab').forEach((t,i)=>t.classList.toggle('on',i===idx));
  document.querySelectorAll('#as-panels .rpanel').forEach((p,i)=>p.classList.toggle('on',i===idx));
}
function mkPanel(rd,idx,opts){
  const p=mk('div','rpanel'+(idx===AS_CUR?' on':''));
  const rb=mk('button','btn bd bs'); rb.style.marginBottom='12px'; rb.textContent=`🗑️ Remove ${rd.region}`;
  rb.onclick=()=>removeReg(idx,opts); p.appendChild(rb);
  const r=rd.region;
  [['🩺 Diagnosis','diagnoses',opts.diagnoses[r]||[]],
   ['💬 Chief Complaints','complaints',opts.complaints[r]||[]],
   ['🔬 Assessment Findings','findings',opts.findings[r]||[]],
   ['📌 Problem List','problems',opts.problems],
   ['💊 Treatment Plan','treatment',opts.treatment[r]||[]]].forEach(([t,k,all])=>{
    p.appendChild(mkSdiv(t));
    p.appendChild(mkPillsAdd(k,all,rd[k]||[],k==='problems'?null:r,opts,idx));
  });
  p.appendChild(mkSdiv('😣 Pain Level — VAS (0–10)'));
  p.appendChild(mkVasEl(rd.vas,idx));
  p.appendChild(mkSdiv('📅 Session Plan'));
  const sr=mk('div','fr');
  sr.appendChild(mkFG('Sessions Planned',mkInp(`as-ss-${idx}`,'e.g. 12',rd.sessionsPlanned||'','number')));
  sr.appendChild(mkFG('Frequency',mkSel(`as-fr-${idx}`,['','Daily','3x/week','2x/week','Weekly'],rd.freq||'')));
  p.appendChild(sr); return p;
}
function showPicker(opts){
  const ex=AS_REGIONS.map(r=>r.region);
  const av=opts.regions.filter(r=>!ex.includes(r));
  if(!av.length){toast('All regions already added',true);return;}
  const ov=mk('div','');
  ov.style.cssText='position:fixed;inset:0;background:rgba(13,61,46,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px';
  ov.id='picker';
  const box=mk('div','');
  box.style.cssText='background:#fff;border-radius:14px;padding:22px;max-width:440px;width:100%;box-shadow:0 8px 36px rgba(13,61,46,.2)';
  box.innerHTML='<div style="font-size:16px;font-weight:700;color:var(--pd);margin-bottom:14px">Select Region</div>';
  const pg=mk('div','pg');
  av.forEach(r=>{
    const b=mk('button','pill'); b.textContent=r;
    b.onclick=()=>{addReg(r,opts);document.getElementById('picker')?.remove();};
    pg.appendChild(b);
  });
  box.appendChild(pg);
  const c=mk('button','btn bg bs'); c.style.marginTop='14px'; c.textContent='Cancel';
  c.onclick=()=>ov.remove(); box.appendChild(c);
  ov.appendChild(box); document.body.appendChild(ov);
}
function addReg(name,opts){
  AS_REGIONS.push({region:name,diagnoses:[],complaints:[],findings:[],problems:[],treatment:[],vas:null,sessionsPlanned:'',freq:''});
  const idx=AS_REGIONS.length-1;
  const tabs=document.getElementById('as-tabs');
  tabs.insertBefore(mkRTab(name,idx),tabs.querySelector('.rtab-add'));
  document.getElementById('as-panels').appendChild(mkPanel(AS_REGIONS[idx],idx,opts));
  activateTab(idx);
}
function removeReg(idx,opts){AS_REGIONS.splice(idx,1);buildForm(opts);}

window.saveAssess = async () => {
  AS_DATE=document.getElementById('as-date')?.value||today();
  AS_DUR=document.getElementById('as-dur')?.value.trim()||'';
  AS_ONSET=document.getElementById('as-onset')?.value||'';
  AS_NOTES=document.getElementById('as-notes')?.value.trim()||'';
  AS_REGIONS.forEach((_,i)=>{
    AS_REGIONS[i].sessionsPlanned=document.getElementById(`as-ss-${i}`)?.value||'';
    AS_REGIONS[i].freq=document.getElementById(`as-fr-${i}`)?.value||'';
  });
  const v={id:AS_FU_ID||uid(),type:AS_TYPE,date:AS_DATE,duration:AS_DUR,onset:AS_ONSET,notes:AS_NOTES,regions:AS_REGIONS,savedAt:Date.now()};
  try {
    const p=PTS.find(x=>x.id===AS_PID);
    let visits=[...(p.visits||[])];
    if(AS_TYPE==='initial'){const i=visits.findIndex(x=>x.type==='initial');if(i>=0)visits[i]=v;else visits.unshift(v);}
    else{const i=visits.findIndex(x=>x.id===v.id);if(i>=0)visits[i]=v;else visits.push(v);}
    await updateDoc(doc(db,'patients',AS_PID),{visits});
    closeM('moAssess'); toast('Saved ✅'); openProfile(AS_PID);
  }catch(e){toast('Error: '+e.message,true);}
};

// ── PROFILE ──
window.openProfile = (pid) => {
  const p=PTS.find(x=>x.id===pid);if(!p)return;
  const doc_=ME.role==='doctor';
  const tags=(arr,cls)=>(arr||[]).map(x=>`<span class="atag ${cls||''}">${x}</span>`).join('');
  const visits=[...(p.visits||[])].sort((a,b)=>{if(a.type==='initial')return -1;if(b.type==='initial')return 1;return a.date>b.date?-1:1;});
  const ini=visits.find(v=>v.type==='initial');

  let html=`<button class="btn bg bs" onclick="goPage('patients')" style="margin-bottom:12px">← Back</button>
  <div class="profhd">
    <div>
      <div class="profname">${p.name}</div>
      <div style="opacity:.75;font-size:13px">${p.age} y/o — ${p.gender||''}${p.job?' · '+p.job:''}${p.phone?' · '+p.phone:''}</div>
      <div class="proftags">
        ${(ini?.regions||[]).map(r=>`<span class="ptag gold">${r.region}</span>`).join('')}
        ${ini?`<span class="ptag">📅 ${ini.date}</span>`:''}
        ${visits.filter(v=>v.type==='followup').length?`<span class="ptag">🔄 ${visits.filter(v=>v.type==='followup').length} Follow-up(s)</span>`:''}
      </div>
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      ${doc_?`<button class="btn ba bs" onclick="openAssess('${p.id}','initial')">✏️ Edit</button>`:''}
      ${doc_?`<button class="btn bp bs" onclick="openAssess('${p.id}','followup')">+ Follow-up</button>`:''}
      ${doc_?`<button class="btn bpdf bs" onclick="exportPDF('${p.id}')">📄 PDF</button>`:''}
      ${doc_?`<button class="btn bcsv bs" onclick="exportCSV('${p.id}')">📊 CSV</button>`:''}
    </div>
  </div>`;

  if(!ini){
    html+=`<div class="card" style="text-align:center;padding:40px;color:var(--muted)">
      <div style="font-size:40px;margin-bottom:10px">📋</div><p style="font-weight:600">No assessment yet</p>
      ${doc_?`<button class="btn bp" style="margin-top:14px" onclick="openAssess('${p.id}','initial')">Start Assessment</button>`:''}
    </div>`;
  } else {
    visits.forEach(v=>{
      const ini_=v.type==='initial';
      html+=`<div class="vcard ${ini_?'':'fu'}">
        ${doc_&&!ini_?`<button class="vdel" onclick="askDelVisit('${p.id}','${v.id}')">🗑️</button>`:''}
        ${doc_&&!ini_?`<button class="vedit" onclick="openAssess('${p.id}','followup','${v.id}')">✏️ Edit</button>`:''}
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          <span class="vlabel ${ini_?'ini':'fup'}">${ini_?'📋 Initial Assessment':'🔄 Follow-up'}</span>
          <span style="font-size:12px;font-weight:600;color:var(--muted)">📅 ${v.date}</span>
          ${v.duration?`<span style="font-size:12px;color:var(--muted)">⏱ ${v.duration}${v.onset?' — '+v.onset:''}</span>`:''}
        </div>`;
      (v.regions||[]).forEach(r=>{
        html+=`<div class="rcard">
          <div class="rtitle">📍 ${r.region}${r.sessionsPlanned?` <span style="font-size:11px;color:var(--muted);font-weight:400">💪 ${r.sessionsPlanned}${r.freq?' · '+r.freq:''}</span>`:''}</div>`;
        if(r.diagnoses?.length) html+=`<div class="asec"><div class="attl">🩺 Diagnosis</div><div class="atags">${tags(r.diagnoses,'key')}</div></div>`;
        if(r.complaints?.length) html+=`<div class="asec"><div class="attl">💬 Complaints</div><div class="atags">${tags(r.complaints)}</div></div>`;
        if(r.vas!=null){const c=r.vas<=3?'#27ae60':r.vas<=6?'#e8a020':'#d94f4f';
          html+=`<div class="asec"><div class="attl">😣 VAS</div>
            <div style="display:inline-flex;align-items:center;gap:8px;background:var(--bg);padding:6px 14px;border-radius:22px">
              <span style="font-size:22px;font-weight:700;color:${c}">${r.vas}</span><span style="color:var(--muted);font-size:12px">/10</span>
              <div style="height:5px;width:90px;background:#ddd;border-radius:5px;overflow:hidden"><div style="height:100%;width:${r.vas*10}%;background:${c}"></div></div>
            </div></div>`;}
        if(r.findings?.length) html+=`<div class="asec"><div class="attl">🔬 Findings</div><div class="atags">${tags(r.findings)}</div></div>`;
        if(r.problems?.length) html+=`<div class="asec"><div class="attl">📌 Problems</div><div class="atags">${tags(r.problems,'red')}</div></div>`;
        if(r.treatment?.length) html+=`<div class="asec"><div class="attl">💊 Treatment</div><div class="atags">${tags(r.treatment)}</div></div>`;
        html+=`</div>`;
      });
      if(v.notes) html+=`<div style="font-size:13px;background:var(--bg);padding:10px;border-radius:var(--rs);margin-top:8px">${v.notes}</div>`;
      html+=`</div>`;
    });
  }
  document.getElementById('pg-profile').innerHTML=html;
  goPage('profile');
};

// ── DELETE ──
window.askDelVisit=(pid,vid)=>{
  document.getElementById('confTitle').textContent='Delete Follow-up';
  document.getElementById('confMsg').textContent='Delete this follow-up? Cannot be undone.';
  document.getElementById('confBtn').onclick=async()=>{
    const p=PTS.find(x=>x.id===pid);
    await updateDoc(doc(db,'patients',pid),{visits:(p.visits||[]).filter(v=>v.id!==vid)});
    toast('Deleted');closeConf();openProfile(pid);
  };
  document.getElementById('confO').classList.add('open');
};
window.askDel=(pid)=>{
  const p=PTS.find(x=>x.id===pid);
  document.getElementById('confTitle').textContent='Delete Patient';
  document.getElementById('confMsg').textContent=`Delete "${p?.name}"?`;
  document.getElementById('confBtn').onclick=async()=>{
    await deleteDoc(doc(db,'patients',pid));
    toast('Deleted');closeConf();goPage('patients');
  };
  document.getElementById('confO').classList.add('open');
};

// ── PDF EXPORT ──
window.exportPDF = async (pid) => {
  const p=PTS.find(x=>x.id===pid);if(!p)return;
  toast('Generating PDF...');
  const visits=[...(p.visits||[])].sort((a,b)=>{if(a.type==='initial')return -1;if(b.type==='initial')return 1;return a.date>b.date?-1:1;});

  const pill=(x,bg,bc,tc)=>`<span style="background:${bg};border:1px solid ${bc};padding:3px 9px;border-radius:12px;font-size:11px;color:${tc};display:inline-block;margin:2px">${x}</span>`;
  const sec=(t,arr,type='')=>arr?.length?`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:#1a5c4a;text-transform:uppercase;margin-bottom:4px">${t}</div><div>${arr.map(x=>type==='key'?pill(x,'#eafaf1','#27ae60','#1a6b40'):type==='red'?pill(x,'#fdeaea','#d94f4f','#d94f4f'):pill(x,'#eef2f0','#ccddd6','#162820')).join('')}</div></div>`:'' ;

  let html=`<div style="font-family:Arial,sans-serif;padding:24px;max-width:700px;color:#162820">
  <div style="border-bottom:3px solid #0d3d2e;padding-bottom:12px;margin-bottom:16px">
    <div style="font-size:18px;font-weight:700;color:#0d3d2e">PT Assessment Report</div>
    <div style="font-size:14px;font-weight:700;margin-top:3px">${p.name}</div>
    <div style="font-size:12px;color:#5a7a6e;margin-top:1px">${p.age} y/o ${p.gender||''} ${p.job?'· '+p.job:''} ${p.phone?'· '+p.phone:''}</div>
  </div>`;

  visits.forEach(v=>{
    const ini_=v.type==='initial';
    html+=`<div style="margin-bottom:18px;border-left:3px solid ${ini_?'#1a5c4a':'#e8a020'};padding-left:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <span style="background:${ini_?'#eafaf1':'#fff3cd'};color:${ini_?'#27ae60':'#b07a00'};padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700">${ini_?'Initial Assessment':'Follow-up'}</span>
        <span style="font-size:12px;font-weight:600;color:#5a7a6e">📅 ${v.date}</span>
        ${v.duration?`<span style="font-size:11px;color:#5a7a6e">⏱ ${v.duration}${v.onset?' — '+v.onset:''}</span>`:''}
      </div>`;
    (v.regions||[]).forEach(r=>{
      html+=`<div style="background:#f8faf9;border-radius:7px;padding:12px;margin-bottom:8px;border-right:3px solid #1a5c4a">
        <div style="font-weight:700;color:#0d3d2e;font-size:12px;margin-bottom:8px">📍 ${r.region}${r.sessionsPlanned?` <span style="font-size:10px;color:#5a7a6e;font-weight:400">— ${r.sessionsPlanned} sessions${r.freq?' · '+r.freq:''}</span>`:''}</div>
        ${sec('Diagnosis',r.diagnoses,'key')}
        ${sec('Chief Complaints',r.complaints)}
        ${r.vas!=null?`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:#1a5c4a;text-transform:uppercase;margin-bottom:3px">Pain Level (VAS)</div><span style="font-size:20px;font-weight:700;color:${r.vas<=3?'#27ae60':r.vas<=6?'#e8a020':'#d94f4f'}">${r.vas}/10</span></div>`:''}
        ${sec('Assessment Findings',r.findings)}
        ${sec('Problem List',r.problems,'red')}
        ${sec('Treatment Plan',r.treatment)}
      </div>`;
    });
    if(v.notes) html+=`<div style="font-size:11px;color:#5a7a6e;font-style:italic;padding:6px 10px;background:#f8faf9;border-radius:5px;margin-top:4px">📝 ${v.notes}</div>`;
    html+=`</div>`;
  });
  html+=`<div style="margin-top:20px;padding-top:10px;border-top:1px solid #d0e4de;font-size:10px;color:#5a7a6e;text-align:center">Physiclinic PT Archive · ${today()}</div></div>`;

  // Render to canvas then PDF
  const div=document.createElement('div');
  div.innerHTML=html;
  div.style.cssText='position:fixed;left:-9999px;top:0;background:#fff;width:700px;z-index:-1';
  document.body.appendChild(div);

  try {
    const canvas=await html2canvas(div,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pW=pdf.internal.pageSize.getWidth()-20;
    const pH=pdf.internal.pageSize.getHeight()-20;
    const iW=pW, iH=(canvas.height*iW)/canvas.width;
    let srcY=0, page=0;
    while(srcY<iH){
      if(page>0)pdf.addPage();
      const sliceH=Math.min(pH,iH-srcY);
      const sc=document.createElement('canvas');
      sc.width=canvas.width; sc.height=Math.round((sliceH/iH)*canvas.height);
      sc.getContext('2d').drawImage(canvas,0,Math.round((srcY/iH)*canvas.height),canvas.width,sc.height,0,0,canvas.width,sc.height);
      pdf.addImage(sc.toDataURL('image/jpeg',0.92),'JPEG',10,10,iW,sliceH);
      srcY+=sliceH; page++;
    }
    pdf.save(`PT_${p.name.replace(/\s+/g,'_')}_${today()}.pdf`);
    toast('PDF downloaded ✅');
  } catch(e){toast('PDF error: '+e.message,true);}
  finally{document.body.removeChild(div);}
};

// ── CSV EXPORT ──
function csvE(v){
  if(v==null||v==='')return '';
  const s=String(v).replace(/\r\n|\r|\n/g,' ');
  return s.includes(',')||s.includes('"')?'"'+s.replace(/"/g,'""')+'"':s;
}
function csvDL(name,rows){
  const blob=new Blob(['\uFEFF'+rows.map(r=>r.map(csvE).join(',')).join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);},1000);
}
window.exportCSV=(pid)=>{
  const p=PTS.find(x=>x.id===pid);if(!p)return;
  const visits=[...(p.visits||[])].sort((a,b)=>{if(a.type==='initial')return -1;if(b.type==='initial')return 1;return a.date>b.date?1:-1;});
  const rows=[['Patient','Age','Gender','Job','Phone','Visit','Date','Duration','Onset','Region','Diagnosis','Complaints','VAS','Findings','Problems','Treatment','Sessions','Freq','Notes']];
  visits.forEach((v,vi)=>(v.regions||[]).forEach((r,ri)=>{
    rows.push([vi===0&&ri===0?p.name:'',vi===0&&ri===0?p.age:'',vi===0&&ri===0?p.gender:'',vi===0&&ri===0?p.job:'',vi===0&&ri===0?p.phone:'',
      ri===0?(v.type==='initial'?'Initial':'Follow-up '+vi):'',ri===0?v.date:'',ri===0?(v.duration||''):'',ri===0?(v.onset||''):'',
      r.region,(r.diagnoses||[]).join(' | '),(r.complaints||[]).join(' | '),r.vas!=null?r.vas+'/10':'',
      (r.findings||[]).join(' | '),(r.problems||[]).join(' | '),(r.treatment||[]).join(' | '),r.sessionsPlanned||'',r.freq||'',ri===0?(v.notes||''):'']);
  }));
  csvDL(`PT_${p.name.replace(/\s+/g,'_')}_${today()}.csv`,rows);
  toast('CSV downloaded ✅');
};
window.exportAll=()=>{
  if(!PTS.length){toast('No patients',true);return;}
  const rows=[['Name','Age','Gender','Job','Phone','Visit','Date','Region','Diagnosis','VAS','Complaints','Findings','Problems','Treatment']];
  PTS.forEach(p=>{
    const visits=p.visits||[];
    if(!visits.length){rows.push([p.name,p.age,p.gender,p.job,p.phone,'No assessment','','','','','','','','']);return;}
    visits.forEach((v,vi)=>(v.regions||[]).forEach((r,ri)=>{
      rows.push([vi===0&&ri===0?p.name:'',vi===0&&ri===0?p.age:'',vi===0&&ri===0?p.gender:'',vi===0&&ri===0?p.job:'',vi===0&&ri===0?p.phone:'',
        ri===0?(v.type==='initial'?'Initial':'Follow-up '+vi):'',ri===0?v.date:'',r.region,
        (r.diagnoses||[]).join(' | '),r.vas!=null?r.vas+'/10':'',(r.complaints||[]).join(' | '),(r.findings||[]).join(' | '),(r.problems||[]).join(' | '),(r.treatment||[]).join(' | ')]);
    }));
  });
  csvDL(`Physiclinic_All_${today()}.csv`,rows);
  toast(`Exported ${PTS.length} patients ✅`);
};

async function renderMgBody(){

    c.innerHTML=`<div class="optlist">${opts.regions.map(r=>`<div class="optrow"><span>${r}</span><button class="optdel" onclick="delOpt('regions',null,${JSON.stringify(r)})">✕</button></div>`).join('')}</div>

    <select class="fc" style="width:auto" onchange="document.getElementById('mgBody').dataset.selReg=this.value;renderMgBody()">

    <div class="addrow" style="margin-top:10px"><input type="text" id="mg-i" placeholder="Add option..."><button onclick="mgAdd()">+ Add</button></div>`;

  }

window.mgAdd=async()=>{
  const val=document.getElementById('mg-i')?.value?.trim();if(!val)return;
  const opts=await getOpts();
  if(MG_TAB==='regions'){if(!opts.regions.includes(val)){opts.regions.push(val);['diagnoses','complaints','findings','treatment'].forEach(k=>{opts[k][val]=[];});}}
  else if(MG_TAB==='problems'){if(!opts.problems.includes(val))opts.problems.push(val);}
  else{const sel=document.getElementById('mgBody').dataset.selReg||opts.regions[0];if(!opts[MG_TAB][sel])opts[MG_TAB][sel]=[];if(!opts[MG_TAB][sel].includes(val))opts[MG_TAB][sel].push(val);}
  await saveOpts(opts);toast('Added ✅');renderMgBody();
};
window.delOpt=async(cat,region,val)=>{
  const opts=await getOpts();
  if(cat==='regions')opts.regions=opts.regions.filter(x=>x!==val);
  else if(cat==='problems')opts.problems=opts.problems.filter(x=>x!==val);
  else if(region&&opts[cat]?.[region])opts[cat][region]=opts[cat][region].filter(x=>x!==val);
  await saveOpts(opts);toast('Removed');renderMgBody();
};

function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function mkSdiv(t){const d=mk('div','sdiv');d.textContent=t;return d;}
function mkInp(id,ph,val='',type='text'){const i=mk('input','fc');i.id=id;i.type=type;i.placeholder=ph;i.value=val;return i;}
function mkSel(id,opts,val){const s=mk('select','fc');s.id=id;opts.forEach(o=>{const op=mk('option');op.value=o;op.textContent=o||'Select...';if(o===val)op.selected=true;s.appendChild(op);});return s;}
function mkFG(label,el){const w=mk('div','fg');const l=mk('label','fl');l.textContent=label;w.appendChild(l);w.appendChild(el);return w;}
function mkPill(key,opt,sel,ri){
  const b=mk('button','pill'+(sel?' sel':''));b.textContent=opt;
  b.onclick=function(){
    if(!AS_REGIONS[ri][key])AS_REGIONS[ri][key]=[];
    if(AS_REGIONS[ri][key].includes(opt)){AS_REGIONS[ri][key]=AS_REGIONS[ri][key].filter(x=>x!==opt);this.classList.remove('sel');}
    else{AS_REGIONS[ri][key].push(opt);this.classList.add('sel');}
  };return b;
}
function mkPillsAdd(key,all,sel,reg,opts,ri){
  const w=mk('div');const pg=mk('div','pg');
  all.forEach(o=>pg.appendChild(mkPill(key,o,sel.includes(o),ri)));
  w.appendChild(pg);
  const row=mk('div','addrow');
  const inp=mk('input');inp.type='text';inp.placeholder='Add new option (saves permanently)...';
  const btn=mk('button');btn.textContent='+ Add';
  btn.onclick=async()=>{
    const val=inp.value.trim();if(!val){toast('Type an option first',true);return;}
    if(reg&&opts[key]&&opts[key][reg]!==undefined){if(!opts[key][reg].includes(val))opts[key][reg].push(val);}
    else if(key==='problems'){if(!opts.problems.includes(val))opts.problems.push(val);}
    await saveOpts(opts);
    if(!AS_REGIONS[ri][key])AS_REGIONS[ri][key]=[];
    if(!AS_REGIONS[ri][key].includes(val))AS_REGIONS[ri][key].push(val);
    pg.appendChild(mkPill(key,val,true,ri));inp.value='';toast('Added ✅');
  };
  row.appendChild(inp);row.appendChild(btn);w.appendChild(row);return w;
}
function mkVasEl(cur,ri){
  const w=mk('div');w.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-top:4px';
  for(let i=0;i<=10;i++){
    const b=mk('button','vas-btn'+(cur===i?' sel':''));b.textContent=i;
    b.onclick=function(){AS_REGIONS[ri].vas=i;w.querySelectorAll('.vas-btn').forEach(x=>x.classList.remove('sel'));this.classList.add('sel');};
    w.appendChild(b);
  }return w;
}
